services:
  mysql:
    image: mysql:8
    container_name: openclaw-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: openclaw-redis
    restart: always
    volumes:
      - redis_data:/data

  backend:
    image: python:3.11
    container_name: openclaw-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: bash -c "pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple/ && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    image: python:3.11
    container_name: openclaw-worker
    working_dir: /app
    volumes:
      - ./backend:/app
    command: bash -c "pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple/ && celery -A app.celery.celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - backend
      - redis

  frontend:
    image: node:20
    container_name: openclaw-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: bash -c "npm config set registry https://registry.npmmirror.com && npm install && npm run dev -- --host --port 5173"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
  redis_data:
