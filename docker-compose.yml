services:
  mysql:
    image: mysql:8
    container_name: openclaw-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root123456!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fastapi_pdf}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app123456}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: openclaw-redis
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openclaw-backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://app:app123456@mysql:3306/fastapi_pdf}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    image: node:20
    container_name: openclaw-frontend
    restart: always
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE=http://localhost:8000
    command: >
      bash -c "npm config set registry https://registry.npmmirror.com && 
               npm install --legacy-peer-deps && 
               npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql_data:
  redis_data:
